<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Palpites da Fase de Grupos | Bolão Copa 2026</title>
  <meta name="description" content="Preencha, importe e salve seus palpites da fase de grupos do Bolão Copa do Mundo 2026." />
  <style>
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(135deg,#020617,#0f172a);color:#f8fafc;min-height:100vh;display:grid;place-items:center;padding:24px}.box{max-width:720px;background:#111827;border:1px solid #334155;border-radius:20px;padding:24px;box-shadow:0 12px 30px rgba(0,0,0,.25)}.small{color:#94a3b8;line-height:1.5}.err{color:#fecaca;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.35);border-radius:14px;padding:14px;margin-top:14px}a{color:#bbf7d0}
  </style>
</head>
<body>
  <div class="box" id="loader">
    <h1>🏆 Carregando ficha do bolão...</h1>
    <p class="small">Preparando a ficha oficial com importação de palpite e envio.</p>
  </div>

  <script>
    const BASE_HTML_URL='https://raw.githubusercontent.com/danieljr-acbr/bolao-copa-2026/474cf53fdab0833c45b7bb24217e664df7e09d11/palpites.html';

    function injectImportSupport(html){
      html=html.replace(
        "const APP_VERSION='2.1-palpite-online';const STORAGE_KEY='bolaoCopa2026PalpitesOnlineDraftV1';",
        "const APP_VERSION='2.2-palpite-online';const STORAGE_KEY='bolaoCopa2026PalpitesOnlineDraftV2';const LEGACY_STORAGE_KEY='bolaoCopa2026PalpitesOnlineDraftV1';"
      );

      html=html.replace(
        /(<section class="card hero">[\s\S]*?<\/section>)/,
        `$1\n    <section id="importInstruction" class="card" style="display:none;border-top:5px solid var(--warning)"><h2>🔁 Importar palpite recuperado</h2><p>Agora clique no botão abaixo e selecione o arquivo que você acabou de baixar na recuperação por e-mail.</p><button type="button" class="secondary" onclick="document.getElementById('importJsonInput').click()">🔁 Importar palpite</button><div class="notice">O navegador pode bloquear a abertura automática do seletor de arquivo. Por isso, o clique manual neste botão é o caminho mais confiável.</div></section>`
      );

      html=html.replace(
        /<section class="sticky-bar">[\s\S]*?<\/section>/,
        `<section class="sticky-bar"><div class="sticky-content"><div class="sticky-info"><strong id="stickyTitle">📝 Preenchimento em andamento</strong><span class="small" id="stickyProgressText">0 de 72 jogos preenchidos.</span><div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div></div><div class="sticky-actions"><button type="button" onclick="downloadJson()">💾 Baixar meus palpites</button><a class="button-link secondary" href="./enviar.html">📤 Enviar palpites</a><button type="button" class="secondary" onclick="document.getElementById('importJsonInput').click()">🔁 Importar palpite</button><a class="button-link secondary" href="./recuperar.html">📧 Recuperar por e-mail</a><a class="button-link secondary" href="./ranking.html">📊 Ver ranking</a><a class="button-link secondary" href="./index.html">🏠 Central</a></div></div></section>\n    <input id="importJsonInput" type="file" accept="application/json,.json" style="display:none" onchange="importJsonFromFile(event)" />`
      );

      html=html.replace(
        '<p class="small">Use o mesmo nome e e-mail no envio para identificar sua participação.</p></section>',
        '<p class="small">Use o mesmo nome e e-mail no envio para identificar sua participação.</p><div id="importStatus" class="notice">Você pode preencher do zero ou importar um palpite salvo anteriormente.</div></section>'
      );

      html=html.replace(
        "function loadDraft(){try{const s=localStorage.getItem(STORAGE_KEY);if(s){const p=JSON.parse(s);return{participant:p.participant||{name:'',email:''},bets:p.bets||{},awards:p.awards||{},createdAt:p.createdAt||new Date().toISOString(),updatedAt:p.updatedAt||''}}}catch(_){}return{participant:{name:'',email:''},bets:{},awards:{},createdAt:new Date().toISOString(),updatedAt:''}}",
        "function loadDraft(){try{const s=localStorage.getItem(STORAGE_KEY)||localStorage.getItem(LEGACY_STORAGE_KEY);if(s){const p=JSON.parse(s);return{participant:p.participant||{name:'',email:''},bets:p.bets||{},awards:p.awards||{},createdAt:p.createdAt||new Date().toISOString(),updatedAt:p.updatedAt||''}}}catch(_){}return{participant:{name:'',email:''},bets:{},awards:{},createdAt:new Date().toISOString(),updatedAt:''}}"
      );

      const importFunctions=`function setImportStatus(message,type='notice'){const el=document.getElementById('importStatus')||document.getElementById('downloadStatus');if(el){el.className=type;el.innerText=message}}
function extractData(json){return json?.data||json?.payload||json?.groupStage?.data||json?.groupStage?.payload||json?.groupStage||json||{}}
function unwrapMap(map,participantId){if(!map||typeof map!=='object')return{};if(participantId&&map[participantId]&&typeof map[participantId]==='object')return map[participantId];const keys=Object.keys(map);if(!keys.length)return{};if(/^m[0-9]{3}$/.test(keys[0]))return map;if(/^p_/.test(keys[0])&&map[keys[0]]&&typeof map[keys[0]]==='object')return map[keys[0]];return map}
function readNumber(obj,names){for(const name of names){if(obj&&obj[name]!==undefined&&obj[name]!==null&&obj[name]!==''){const value=Number(obj[name]);if(Number.isFinite(value))return value}}return null}
function normalizeBet(bet){if(!bet)return null;if(Array.isArray(bet)&&bet.length>=2){const a=Number(bet[0]);const b=Number(bet[1]);if(Number.isFinite(a)&&Number.isFinite(b))return{scoreA:a,scoreB:b}}if(typeof bet==='string'){const match=bet.match(/([0-9]+)[^0-9]+([0-9]+)/);if(match)return{scoreA:Number(match[1]),scoreB:Number(match[2])}}if(typeof bet!=='object')return null;const scoreA=readNumber(bet,['scoreA','homeScore','scoreHome','placarA','mandante','timeA','teamA','a','golsA','home','casa']);const scoreB=readNumber(bet,['scoreB','awayScore','scoreAway','placarB','visitante','timeB','teamB','b','golsB','away','fora']);if(scoreA===null||scoreB===null)return null;return{scoreA,scoreB}}
function findParticipant(data,json){if(Array.isArray(data.participants)&&data.participants.length)return data.participants[0];if(data.participant&&typeof data.participant==='object')return data.participant;if(json.participant&&typeof json.participant==='object')return json.participant;return{id:json.participantId||data.participantId||'',name:json.name||data.name||json.nome||data.nome||'',email:json.email||data.email||''}}
function normalizeAwardValue(value){if(!value)return'';if(typeof value==='object')return value.name||value.nome||value.value||'';return value}
function importJsonPayload(json){const data=extractData(json);const participant=findParticipant(data,json);const participantId=participant.id||data.participantId||json.participantId||Object.keys(data.bets||{}).find(k=>/^p_/.test(k))||Object.keys(data.awards||{}).find(k=>/^p_/.test(k))||'';const bets=unwrapMap(data.bets||data.palpites||data.guesses||{},participantId);const awards=unwrapMap(data.awards||data.premios||data.premiacoes||{},participantId);draft={participant:{name:participant.name||participant.nome||json.name||json.nome||data.name||data.nome||'',email:participant.email||json.email||data.email||''},bets:{},awards:{},createdAt:participant.createdAt||data.metadata?.createdAt||new Date().toISOString(),updatedAt:new Date().toISOString()};Object.entries(bets).forEach(([id,bet])=>{const normalized=normalizeBet(bet);if(/^m[0-9]{3}$/.test(id)&&normalized){draft.bets[id]={scoreA:normalized.scoreA,scoreB:normalized.scoreB,updatedAt:bet.updatedAt||bet.dataAtualizacao||new Date().toISOString(),invalidReason:''}}});Object.entries(awards).forEach(([k,v])=>{const value=normalizeAwardValue(v);if(value)draft.awards[k]=value});localStorage.setItem(STORAGE_KEY,JSON.stringify(draft));restoreDraftToFields();if(typeof renderPlayerOptions==='function')renderPlayerOptions();renderAwards();renderGames();updateSummary();const instruction=document.getElementById('importInstruction');if(instruction)instruction.style.display='none';const totalBets=Object.keys(draft.bets).length;const totalAwards=Object.keys(draft.awards).length;if(!totalBets&&!totalAwards){setImportStatus('Arquivo lido, mas nenhum palpite compatível foi encontrado. Verifique se este é o arquivo baixado pela recuperação por e-mail.','error');return}setImportStatus('Palpite importado com sucesso: '+totalBets+' jogos e '+totalAwards+' premiações.','success')}
function importJsonFromFile(event){const file=event.target.files&&event.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(){try{importJsonPayload(JSON.parse(reader.result));event.target.value=''}catch(error){console.error(error);setImportStatus('Não foi possível ler o palpite selecionado. O arquivo precisa estar em formato JSON válido.','error')}};reader.readAsText(file,'UTF-8')}
function mostrarInstrucaoImportacao(){const params=new URLSearchParams(window.location.search);if(params.get('importar')==='1'){const instruction=document.getElementById('importInstruction');if(instruction){instruction.style.display='block';setTimeout(()=>instruction.scrollIntoView({behavior:'smooth',block:'start'}),300)}setImportStatus('Clique em Importar palpite e selecione o arquivo recuperado.','notice')}}`;
      html=html.replace('function buildExportPayload(){', importFunctions+'function buildExportPayload(){');
      html=html.replace("function init(){renderPlayerOptions();restoreDraftToFields();renderAwards();renderGames();updateSummary()}init();", "function init(){renderPlayerOptions();restoreDraftToFields();renderAwards();renderGames();updateSummary();mostrarInstrucaoImportacao()}init();");
      html=html.replace("localStorage.removeItem(STORAGE_KEY);localStorage.removeItem('bolaoCopa2026PalpitesCollapsedGroups');", "localStorage.removeItem(STORAGE_KEY);localStorage.removeItem(LEGACY_STORAGE_KEY);localStorage.removeItem('bolaoCopa2026PalpitesCollapsedGroups');");
      html=html.replaceAll('href="enviar.html"','href="./enviar.html"');
      html=html.replaceAll("href='enviar.html'","href='./enviar.html'");

      const stickyAutoHideCss=`<style>@media(max-width:700px){.sticky-bar{transition:transform .25s ease,opacity .25s ease;will-change:transform}.sticky-bar.mobile-sticky-hidden{transform:translateY(calc(-100% - 12px));opacity:0;pointer-events:none}}</style>`;
      const stickyAutoHideScript=`<script>(function(){let last=window.pageYOffset||document.documentElement.scrollTop||0;let ticking=false;function update(){const sticky=document.querySelector('.sticky-bar');if(!sticky||window.innerWidth>700){if(sticky)sticky.classList.remove('mobile-sticky-hidden');ticking=false;return}const current=window.pageYOffset||document.documentElement.scrollTop||0;const goingDown=current>last;const pastMargin=current>120;if(goingDown&&pastMargin){sticky.classList.add('mobile-sticky-hidden')}else{sticky.classList.remove('mobile-sticky-hidden')}last=Math.max(current,0);ticking=false}window.addEventListener('scroll',function(){if(!ticking){window.requestAnimationFrame(update);ticking=true}},{passive:true});window.addEventListener('resize',update)})();<\/script>`;
      html=html.replace('</head>',stickyAutoHideCss+'</head>');
      html=html.replace('</body>',stickyAutoHideScript+'</body>');

      return html;
    }

    function appendFlagsScript(){
      if(document.getElementById('palpitesFlagsScript')) return;
      const script=document.createElement('script');
      script.id='palpitesFlagsScript';
      script.src='./js/palpites-flags.js?v=4';
      script.defer=true;
      document.body.appendChild(script);
    }

    fetch(BASE_HTML_URL,{cache:'no-store'})
      .then(response=>{
        if(!response.ok) throw new Error('Não foi possível carregar a ficha-base.');
        return response.text();
      })
      .then(html=>{
        document.open();
        document.write(injectImportSupport(html));
        document.close();
        setTimeout(appendFlagsScript,0);
      })
      .catch(error=>{
        document.getElementById('loader').innerHTML='<h1>Não foi possível carregar a ficha</h1><div class="err">'+String(error.message||error)+'</div><p class="small">Tente atualizar a página. Se o problema continuar, acesse a central do bolão.</p><p><a href="index.html">Voltar para a central</a></p>';
      });
  </script>
</body>
</html>
