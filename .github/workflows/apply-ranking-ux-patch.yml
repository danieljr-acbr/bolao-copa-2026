name: Apply ranking UX patch

on:
  push:
    paths:
      - '.github/workflows/apply-ranking-ux-patch.yml'

permissions:
  contents: write

jobs:
  patch-ranking:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Patch ranking copy and metrics
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('ranking.html')
          s = p.read_text(encoding='utf-8')

          replacements = [
            ('Ranking Geral - Bolão Copa 2026', 'Ranking do Bolão Copa 2026'),
            ('Ranking Geral do Bolão', 'Ranking do Bolão'),
            ('Classificação dos participantes, premiação atual e lista de confirmados do Bolão Copa do Mundo 2026.', 'Classificação geral, premiação acumulada e participantes confirmados do Bolão Copa do Mundo 2026.'),
            ('🔄 Atualizar dados', '🔄 Atualizar ranking'),
            ('🏠 Voltar para a Central', '🏠 Central'),
            ('📝 Fase de Grupos', '⚽ Primeira Fase'),
            ('<a href="#ranking">Ranking</a>\n        <a href="#participantes">Participantes</a>\n        <a href="#premiacao">Premiação</a>\n        <a href="#auditoria">Resumo</a>', '<a href="#ranking">Classificação</a>\n        <a href="#premiacao">Premiação</a>\n        <a href="#participantes">Participantes</a>'),
            ('<div class="metric-label">Participantes</div><div class="metric-value" id="metricParticipantes">0</div><div class="metric-sub">confirmados/carregados</div>', '<div class="metric-label">Participando do Bolão</div><div class="metric-value" id="metricParticipantes">0</div><div class="metric-sub">participantes confirmados</div>'),
            ('<div class="metric-label">Arrecadação estimada</div>', '<div class="metric-label">Prêmio total acumulado</div>'),
            ('<div class="metric-label">Prêmio do 1º</div>', '<div class="metric-label">Prêmio do campeão</div>'),
            ('<div class="metric-label">Última atualização</div>', '<div class="metric-label">Atualizado em</div>'),
            ('<div class="metric-sub">dados consolidados</div>', '<div class="metric-sub">horário local</div>'),
            ('<h2>🏆 Classificação</h2>', '<h2>🏆 Classificação Geral</h2>'),
            ('<p>Critérios de ordenação nesta página: maior pontuação informada no consolidado, maior quantidade de palpites carregados e ordem alfabética. Quando o consolidado trouxer pontuação oficial completa, ela será usada automaticamente.</p>', '<p>O ranking é ordenado pela pontuação. Quando os jogos começarem a ser apurados, também mostraremos os acertos de cada participante.</p>'),
            ('Carregando dados consolidados...', 'Carregando ranking...'),
            ('Lista gerada a partir dos participantes presentes no JSON consolidado.', 'Lista de participantes que estão concorrendo no bolão.'),
            ('Distribuição baseada na arrecadação estimada pelos participantes carregados.', 'Distribuição baseada no prêmio total acumulado pelos participantes confirmados.'),
            ('A premiação final deve considerar apenas participantes efetivamente pagos/confirmados.', 'A premiação final considera somente participantes com pagamento aprovado.'),
          ]
          for old, new in replacements:
            s = s.replace(old, new)

          # Remove operational summary section completely
          start = s.find('      <section class="card" id="auditoria">')
          if start != -1:
            end = s.find('      </section>', start)
            if end != -1:
              end += len('      </section>')
              s = s[:start] + s[end:]

          # Add table header before ranking list if absent
          marker = '        <div id="podium" class="podium"></div>\n        <div id="rankingLista" class="ranking-list"></div>'
          replacement = '        <div id="podium" class="podium"></div>\n        <div class="table-head"><div>Pos.</div><div>Participante</div><div style="text-align:right">Pontos</div><div style="text-align:right">Acertos</div></div>\n        <div id="rankingLista" class="ranking-list"></div>'
          s = s.replace(marker, replacement)

          # CSS additions/replacements
          s = s.replace('grid-template-columns: 58px minmax(0, 1fr) auto;', 'grid-template-columns: 58px minmax(0, 1fr) 110px 110px;')
          s = s.replace('.ranking-score { color: var(--green2); font-size: 24px; font-weight: 950; text-align: right; }', '.ranking-score,.ranking-hits{font-size:22px;font-weight:950;text-align:right}.ranking-score{color:var(--green2)}.ranking-hits{color:#fde68a}.table-head{display:grid;grid-template-columns:58px minmax(0,1fr) 110px 110px;gap:14px;padding:0 14px 8px;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.07em;font-weight:900}')
          s = s.replace('.ranking-card { grid-template-columns: 44px minmax(0, 1fr); }\n      .ranking-score { grid-column: 1 / -1; text-align: left; }', '.ranking-card,.table-head{grid-template-columns:44px minmax(0,1fr)}\n      .table-head{display:none}\n      .ranking-score,.ranking-hits{grid-column:2;text-align:left;font-size:18px}\n      .ranking-score:before{content:"Pontos: ";color:var(--muted);font-weight:700}\n      .ranking-hits:before{content:"Acertos: ";color:var(--muted);font-weight:700}')

          # JS functions
          s = s.replace('''    function getPoints(participant, bets) {
      const explicit = Number(participant.points ?? participant.score ?? participant.totalPoints ?? participant.pontos ?? participant.pontuacao ?? NaN);
      if (Number.isFinite(explicit)) return explicit;
      return countBets(participant, bets);
    }''', '''    function getPoints(participant) {
      const explicit = Number(participant.points ?? participant.score ?? participant.totalPoints ?? participant.pontos ?? participant.pontuacao ?? NaN);
      return Number.isFinite(explicit) ? explicit : 0;
    }

    function getHits(participant) {
      const explicit = Number(participant.hits ?? participant.acertos ?? participant.correctResults ?? participant.resultadosCorretos ?? NaN);
      return Number.isFinite(explicit) ? explicit : 0;
    }''')

          s = s.replace('''          points: getPoints(participant, bets),
          betsCount: countBets(participant, bets),
          raw: participant''', '''          points: getPoints(participant),
          hits: getHits(participant),
          betsCount: countBets(participant, bets),
          raw: participant''')
          s = s.replace(".sort((a, b) => b.points - a.points || b.betsCount - a.betsCount || a.name.localeCompare(b.name, 'pt-BR'));", ".sort((a, b) => b.points - a.points || b.hits - a.hits || a.name.localeCompare(b.name, 'pt-BR'));")
          s = s.replace('<div class="podium-meta">${item.betsCount} palpite(s) carregado(s)</div>', '<div class="podium-meta">${item.hits} acerto(s)</div>')
          s = s.replace('<div class="ranking-meta"><span>${item.betsCount} palpite(s)</span><span>Posição ${index + 1}</span></div>', '<div class="ranking-meta">Posição ${index + 1}</div>')
          s = s.replace('<div class="ranking-score">${item.points} pts</div>\n          </div>', '<div class="ranking-score">${item.points} pts</div>\n            <div class="ranking-hits">${item.hits}</div>\n          </div>')
          s = s.replace('<span>${index + 1}º no ranking · ${item.betsCount} palpite(s)</span>', '<span>${index + 1}º no ranking · ${item.points} ponto(s)</span>')

          # Remove operational metrics calls/functions
          start = s.find('    function renderOperationalMetrics(ranking) {')
          if start != -1:
            end = s.find('    function renderData(data) {', start)
            if end != -1:
              s = s[:start] + s[end:]
          s = s.replace('        renderOperationalMetrics([]);\n', '')
          s = s.replace('      renderOperationalMetrics(ranking);\n', '')
          s = s.replace("      setText('metricStatus', 'OK');\n", '')
          s = s.replace("      setText('metricStatus', '...');\n", '')
          s = s.replace("        setText('metricStatus', 'Erro');\n", '')
          s = s.replace("          setText('metricStatus', 'Erro');\n", '')

          s = s.replace('Ainda não há participantes no JSON consolidado.', 'Ainda não há participantes confirmados no bolão.')
          s = s.replace('`${participants.length} participante(s) carregado(s). Arrecadação estimada: ${formatBRL(participants.length * ENTRY_FEE)}.`', '`${participants.length} participante(s) confirmado(s). Prêmio total acumulado: ${formatBRL(participants.length * ENTRY_FEE)}.`')
          s = s.replace('Não foi possível carregar os dados consolidados. Verifique a publicação do Apps Script.', 'Não foi possível carregar o ranking agora. Tente novamente em instantes.')
          s = s.replace("new Error('Falha ao carregar JSONP.')", "new Error('Falha ao carregar ranking.')")

          p.write_text(s, encoding='utf-8')
          PY
      - name: Remove temporary workflow
        run: rm -f .github/workflows/apply-ranking-ux-patch.yml
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ranking.html .github/workflows/apply-ranking-ux-patch.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Refatora ranking para participante final"
            git push
          fi
