name: Apply UX copy patch

on:
  push:
    paths:
      - '.github/workflows/apply-ux-copy-patch.yml'

permissions:
  contents: write

jobs:
  patch-copy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update user-facing copy
        run: |
          python3 - <<'PY'
          from pathlib import Path

          replacements = {
            'palpites.html': [
              ('<title>Enviar Palpites | Bolão Copa 2026</title>', '<title>Palpites da Fase de Grupos | Bolão Copa 2026</title>'),
              ('Preencha seus palpites da fase de grupos do Bolão Copa do Mundo 2026 e gere o JSON oficial para envio.', 'Preencha seus palpites da fase de grupos do Bolão Copa do Mundo 2026 e salve o arquivo para envio.'),
              ('Faça sua aposta da fase de grupos e gere o arquivo oficial do seu bolão.', 'Preencha seus palpites da fase de grupos e salve sua ficha do bolão.'),
              ('até você baixar o arquivo do seu bolão.', 'até você baixar o arquivo dos seus palpites.'),
              ('<button type="button" onclick="downloadJson()">💾 Baixar Bolão</button>', '<button type="button" onclick="downloadJson()">💾 Baixar meus palpites</button>'),
              ('<button type="button" class="secondary" onclick="openSendModal()">📤 Enviar Bolão</button>', '<button type="button" class="secondary" onclick="openSendModal()">📤 Enviar palpites</button>'),
              ('<a class="button-link secondary" href="./index.html">📊 Ver ranking</a>', '<a class="button-link secondary" href="./ranking.html">📊 Ver ranking</a>'),
              ('E-mail opcional', 'E-mail'),
              ('Use sempre o mesmo nome/apelido para facilitar a consolidação dos palpites.', 'Use o mesmo nome e e-mail no envio para identificar sua participação.'),
              ('Quando terminar, clique em “Baixar JSON”.', 'Quando terminar, clique em “Baixar meus palpites”.'),
              ('Depois de preencher seus palpites, baixe o arquivo do seu bolão e envie pelo formulário oficial.', 'Depois de preencher seus palpites, baixe o arquivo e envie pela página oficial de envio.'),
              ('💾 Baixar meu Bolão', '💾 Baixar meus palpites'),
              ('📤 Enviar pelo formulário', '📤 Enviar pela página de envio'),
              ('<div class="hero-badge">📤 Envio oficial do bolão</div>', '<div class="hero-badge">📤 Envio oficial dos palpites</div>'),
              ('<h2 id="sendModalTitle">Enviar seu Bolão</h2>', '<h2 id="sendModalTitle">Enviar seus palpites</h2>'),
              ('Para participar oficialmente, primeiro baixe o arquivo do seu bolão e depois envie pelo formulário.', 'Para participar oficialmente, primeiro baixe o arquivo dos seus palpites e depois envie pela página de envio.'),
              ('<strong>1. Baixe seu Bolão</strong>', '<strong>1. Baixe seus palpites</strong>'),
              ('<strong>2. Abra o formulário</strong>', '<strong>2. Abra a página de envio</strong>'),
              ('Depois, anexe o arquivo baixado no formulário oficial.', 'Depois, anexe o arquivo baixado na página de envio.'),
              ('<button type="button" onclick="downloadJson()">💾 Baixar Bolão</button>', '<button type="button" onclick="downloadJson()">💾 Baixar meus palpites</button>'),
              ('href="https://forms.gle/vno4T9cUzwhmKzL98" target="_blank" rel="noopener noreferrer"', 'href="enviar.html"'),
              ('📤 Abrir formulário oficial', '📤 Abrir página de envio'),
              ('Dica: depois de baixar, procure pelo arquivo chamado “palpites-seu-nome...” na pasta de downloads do seu celular ou computador.', 'Dica: depois de baixar, procure o arquivo dos seus palpites na pasta de downloads do seu celular ou computador.'),
            ],
            'palpites-matamata.html': [
              ('E-mail opcional', 'E-mail'),
              ('Use o mesmo nome/apelido usado na fase de grupos para consolidar corretamente o ranking.', 'Use o mesmo e-mail informado no cadastro da fase de grupos.'),
              ('Depois que a etapa estiver aberta, baixe o arquivo do seu bolão e envie pelo formulário oficial.', 'Depois que a etapa estiver aberta, baixe o arquivo dos seus palpites e envie pela página oficial de envio.'),
              ('💾 Baixar meu Bolão do Mata-mata', '💾 Baixar meus palpites do Mata-Mata'),
              ('📤 Enviar pelo formulário', '📤 Enviar pela página de envio'),
              ('<div class="hero-badge">📤 Envio oficial do mata-mata</div>', '<div class="hero-badge">📤 Envio oficial dos palpites</div>'),
              ('<h2 id="sendModalTitle">Enviar seu Bolão do Mata-mata</h2>', '<h2 id="sendModalTitle">Enviar palpites do Mata-Mata</h2>'),
              ('Quando o mata-mata estiver aberto, primeiro baixe o arquivo do seu bolão e depois envie pelo formulário.', 'Quando o mata-mata estiver aberto, primeiro baixe o arquivo dos seus palpites e depois envie pela página de envio.'),
              ('<strong>1. Baixe seu Bolão</strong>', '<strong>1. Baixe seus palpites</strong>'),
              ('Clique em “Baixar Bolão” para salvar o arquivo no seu dispositivo.', 'Clique em “Baixar meus palpites” para salvar o arquivo no seu dispositivo.'),
              ('<strong>2. Abra o formulário</strong>', '<strong>2. Abra a página de envio</strong>'),
              ('Anexe o arquivo baixado no formulário oficial do mata-mata.', 'Anexe o arquivo baixado na página de envio.'),
              ('<button type="button" id="downloadButtonModal" onclick="downloadKnockoutJson()" disabled>💾 Baixar Bolão</button>', '<button type="button" id="downloadButtonModal" onclick="downloadKnockoutJson()" disabled>💾 Baixar meus palpites</button>'),
              ('href="https://forms.gle/vno4T9cUzwhmKzL98" target="_blank" rel="noopener noreferrer"', 'href="enviar.html"'),
              ('📤 Abrir formulário oficial', '📤 Abrir página de envio'),
              ('O formulário do mata-mata poderá ser outro no futuro. Por enquanto, este botão aponta para o formulário oficial atual.', 'Use o mesmo e-mail do cadastro para vincular estes palpites à sua participação.'),
            ],
          }

          for file_name, pairs in replacements.items():
            path = Path(file_name)
            text = path.read_text(encoding='utf-8')
            original = text
            for old, new in pairs:
              text = text.replace(old, new)
            path.write_text(text, encoding='utf-8')
            print(file_name, 'changed' if text != original else 'no changes')
          PY
      - name: Remove temporary workflow
        run: rm -f .github/workflows/apply-ux-copy-patch.yml
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add palpites.html palpites-matamata.html .github/workflows/apply-ux-copy-patch.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Ajusta linguagem das paginas de palpites"
            git push
          fi
