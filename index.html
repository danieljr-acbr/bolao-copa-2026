<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bolão Copa 2026 - v2.0 Final</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --card2: #1f2937;
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
      --border: #334155;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a);
      color: var(--text);
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    h1, h2, h3 { margin: 0 0 12px; }
    p { color: var(--muted); line-height: 1.5; }

    .card {
      background: rgba(17, 24, 39, .92);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,.25);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    label {
      display: block;
      margin: 10px 0 6px;
      color: var(--muted);
      font-size: 14px;
    }

    input, select, button {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 12px;
      font-size: 15px;
    }

    input, select {
      background: #020617;
      color: var(--text);
    }

    button {
      background: var(--accent);
      color: #052e16;
      font-weight: 700;
      cursor: pointer;
      border: none;
      margin-top: 12px;
    }

    button.secondary {
      background: #334155;
      color: var(--text);
    }

    button.danger {
      background: var(--danger);
      color: #fff;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #064e3b;
      color: #bbf7d0;
      font-size: 13px;
      margin-top: 8px;
    }

    .hidden { display: none; }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 14px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: middle;
    }

    th { color: #cbd5e1; background: #0f172a; }
    tr:hover td { background: rgba(51,65,85,.35); }

    .score-inputs {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .score-inputs input {
      max-width: 70px;
      text-align: center;
    }

    .small { font-size: 13px; color: var(--muted); }
    .points { font-weight: 700; color: #bbf7d0; }
    .ranking-leaderboard { display: grid; gap: 12px; }
    .ranking-card {
      display: grid;
      grid-template-columns: 64px 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(15, 23, 42, .68);
    }
    .ranking-card.top-1 { border-color: rgba(245, 158, 11, .75); background: rgba(245, 158, 11, .10); }
    .ranking-card.top-2 { border-color: rgba(203, 213, 225, .60); }
    .ranking-card.top-3 { border-color: rgba(180, 83, 9, .70); }
    .ranking-pos { font-size: 28px; text-align: center; }
    .ranking-name strong { display: block; font-size: 18px; margin-bottom: 6px; }
    .ranking-meta { display: flex; flex-wrap: wrap; gap: 8px; }
    .ranking-meta span {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(51,65,85,.72);
      color: #cbd5e1;
      font-size: 12px;
    }
    .ranking-score { text-align: right; }
    .ranking-score strong { display: block; font-size: 26px; color: #bbf7d0; }
    .ranking-score span { color: var(--muted); font-size: 12px; }
    .ranking-empty { padding: 14px; border-radius: 14px; background: rgba(51,65,85,.35); }
    .official-score { color: #fde68a; font-weight: 700; }
    .pill { display: inline-block; padding: 4px 8px; border-radius: 999px; background: #1e293b; color: #cbd5e1; font-size: 12px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .actions button { width: auto; min-width: 140px; }

    .sticky-save-bar {
      position: sticky;
      top: 0;
      z-index: 10;
      margin-bottom: 18px;
      background: rgba(15, 23, 42, .96);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px 16px;
      box-shadow: 0 12px 28px rgba(0,0,0,.35);
      backdrop-filter: blur(8px);
    }

    .sticky-save-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .participant-summary {
      flex: 1;
      min-width: 240px;
    }

    .participant-summary strong {
      display: block;
      font-size: 16px;
      margin-bottom: 4px;
    }

    .progress-wrap {
      margin-top: 8px;
      width: 100%;
      height: 10px;
      background: #020617;
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width .25s ease;
    }

    .sticky-save-bar button {
      width: auto;
      min-width: 240px;
      margin-top: 0;
    }

    .row-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .row-actions button {
      margin-top: 0;
    }

    .row-actions .clear-bet {
      background: #334155;
      color: var(--text);
      font-weight: 700;
    }

    .row-actions .clear-bet:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    tr.bet-complete td {
      background: rgba(34, 197, 94, .06);
    }


    .match-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 14px;
    }

    .match-card {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(15, 23, 42, .72);
      padding: 14px;
      box-shadow: 0 10px 22px rgba(0,0,0,.18);
    }

    .match-card.bet-complete {
      border-color: rgba(34, 197, 94, .55);
      background: rgba(34, 197, 94, .07);
    }

    .match-card.brazil-match {
      border-color: rgba(34, 197, 94, .85);
      box-shadow: 0 0 0 1px rgba(34,197,94,.16), 0 12px 26px rgba(0,0,0,.24);
    }

    .match-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .match-stage {
      font-size: 12px;
      color: #cbd5e1;
      background: #1e293b;
      border-radius: 999px;
      padding: 4px 9px;
    }

    .match-number { color: var(--muted); font-size: 12px; }

    .teams-line {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 10px;
      margin: 12px 0;
    }

    .team {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      font-weight: 800;
    }

    .team.away { justify-content: flex-end; text-align: right; }
    .team-name { overflow: hidden; text-overflow: ellipsis; }

    .flag-img {
      width: 26px;
      height: 18px;
      object-fit: cover;
      border-radius: 3px;
      box-shadow: 0 0 0 1px rgba(255,255,255,.18);
      flex: 0 0 auto;
    }

    .placeholder-flag {
      width: 26px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
      background: #334155;
      font-size: 13px;
      flex: 0 0 auto;
    }

    .versus { color: var(--muted); font-weight: 800; }

    .match-meta {
      display: grid;
      gap: 4px;
      margin: 8px 0 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .card-score-area {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .card-score-area .score-inputs input { max-width: 64px; }

    .clear-inline {
      width: auto;
      min-width: 96px;
      margin-top: 0;
      background: #334155;
      color: var(--text);
    }

    .clear-inline:disabled { opacity: .45; cursor: not-allowed; }

    .group-title { cursor: pointer; user-select: none; }
    .group-title .group-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .group-caret { font-size: 14px; color: var(--accent); }
    .group-progress { color: var(--muted); font-size: 13px; font-weight: normal; }
    .group-content.collapsed { display: none; }

    .status-line {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .status-line .points { font-size: 13px; }

    @media (max-width: 700px) {
      .sticky-save-bar { top: 0; border-radius: 0 0 18px 18px; margin-left: -24px; margin-right: -24px; }
      .sticky-save-bar button { width: 100%; min-width: 0; }
    }


    .view-controls {
      display: flex;
      gap: 10px;
      align-items: end;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .view-controls > div { flex: 1; min-width: 220px; }

    .group-block {
      margin: 18px 0 26px;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      background: rgba(15, 23, 42, .45);
    }

    .group-title {
      margin: 0;
      padding: 14px 16px;
      background: #0f172a;
      color: #f8fafc;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .group-title span {
      color: var(--muted);
      font-size: 13px;
      font-weight: normal;
    }


    #betsArea {
      max-height: 620px;
      overflow-y: auto;
      padding-right: 8px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    #betsArea::-webkit-scrollbar { width: 10px; }
    #betsArea::-webkit-scrollbar-track { background: transparent; }
    #betsArea::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }

    #betsArea table thead th {
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .compact-note {
      margin-top: 6px;
      margin-bottom: 0;
    }

    .validation-warning {
      margin-top: 8px;
      padding: 8px 10px;
      border: 1px solid rgba(245, 158, 11, .45);
      background: rgba(245, 158, 11, .10);
      color: #fde68a;
      border-radius: 10px;
      font-size: 12px;
      line-height: 1.35;
    }

    .integrity-note {
      margin-top: 8px;
      padding: 8px 10px;
      border: 1px solid rgba(34, 197, 94, .30);
      background: rgba(34, 197, 94, .07);
      color: #bbf7d0;
      border-radius: 10px;
      font-size: 12px;
      line-height: 1.35;
    }


    @media (max-width: 700px) {
      table, thead, tbody, th, td, tr { display: block; }
      thead { display: none; }
      tr { margin-bottom: 14px; border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
      td { border-bottom: 1px solid var(--border); }
      td::before {
        content: attr(data-label);
        display: block;
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 6px;
      }
      .actions button { width: 100%; }
    }


    .version-pill {
      display: inline-block;
      vertical-align: middle;
      font-size: 12px;
      color: #bbf7d0;
      background: #064e3b;
      border: 1px solid rgba(187, 247, 208, .25);
      border-radius: 999px;
      padding: 4px 8px;
      margin-left: 8px;
    }

    .diagnostic-panel {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    .diagnostic-status {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      background: rgba(2, 6, 23, .55);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }

    .diagnostic-status strong {
      font-size: 16px;
    }

    .diagnostic-status.ok { border-color: rgba(34, 197, 94, .65); }
    .diagnostic-status.warn { border-color: rgba(245, 158, 11, .75); }
    .diagnostic-status.fail { border-color: rgba(239, 68, 68, .75); }

    .diagnostic-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
    }

    .diagnostic-item {
      background: rgba(15, 23, 42, .65);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      min-height: 78px;
    }

    .diagnostic-item .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }

    .diagnostic-item .value {
      color: var(--text);
      font-weight: 700;
      word-break: break-word;
    }

    .diagnostic-log {
      background: #020617;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      max-height: 320px;
      overflow: auto;
      font-family: Consolas, Monaco, monospace;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      color: #cbd5e1;
    }

    .diagnostic-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .diagnostic-actions button {
      width: auto;
      min-width: 220px;
    }


    .awards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 14px;
      margin-top: 12px;
    }

    .award-card {
      background: rgba(15, 23, 42, .74);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
    }

    .award-card strong {
      display: block;
      margin-bottom: 6px;
    }

    .award-card .award-points {
      display: inline-block;
      margin-bottom: 8px;
      color: #fde68a;
      font-size: 12px;
    }

    .award-card input {
      margin-top: 4px;
    }

    .award-card.disabled {
      opacity: .62;
    }

    .award-admin {
      margin-top: 14px;
      border-top: 1px solid var(--border);
      padding-top: 14px;
    }

    .award-result-pill {
      display: inline-block;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      background: #312e81;
      color: #ddd6fe;
      margin-left: 6px;
    }

    .ranking-breakdown {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .ranking-breakdown span {
      background: rgba(15, 23, 42, .78);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 8px;
      color: #cbd5e1;
      font-size: 12px;
    }

    .diagnostic-hint {
      border-left: 4px solid var(--warning);
      background: rgba(245, 158, 11, .08);
      padding: 12px 14px;
      border-radius: 12px;
      color: #fde68a;
      margin-top: 12px;
    }



    .bracket-progress-wrap {
      margin: 10px 0 16px;
      background: rgba(2, 6, 23, .7);
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
      height: 12px;
    }

    .bracket-progress-bar {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width .25s ease;
    }

    .champion-path {
      margin: 14px 0 18px;
      padding: 16px;
      border: 1px solid rgba(34, 197, 94, .35);
      border-radius: 18px;
      background: rgba(34, 197, 94, .08);
    }

    .champion-path-list {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .champion-path-step {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(15, 23, 42, .75);
      border: 1px solid var(--border);
      font-size: 13px;
      color: #e5e7eb;
    }

    .champion-path-arrow { color: var(--muted); }

    .team-original-note {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-top: 2px;
    }

    .awaiting-team {
      color: var(--muted);
      font-weight: 700;
    }

    .knockout-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin: 14px 0;
    }

    .knockout-summary-card {
      background: rgba(15, 23, 42, .78);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
    }

    .knockout-summary-card strong {
      display: block;
      font-size: 18px;
      margin-top: 4px;
    }

    .knockout-phase {
      margin-top: 18px;
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      background: rgba(15, 23, 42, .42);
    }

    .knockout-phase-title {
      margin: 0;
      padding: 14px 16px;
      background: #0f172a;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .knockout-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(310px, 1fr));
      gap: 14px;
      padding: 14px;
    }

    .knockout-card {
      background: rgba(2, 6, 23, .55);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      overflow: hidden;
    }

    .knockout-card.ready {
      border-color: rgba(34, 197, 94, .45);
      background: rgba(34, 197, 94, .06);
    }

    .knockout-card.pending {
      opacity: .86;
    }

    .knockout-teams {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .knockout-team-line {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      background: rgba(15, 23, 42, .75);
      border: 1px solid rgba(51, 65, 85, .7);
      border-radius: 12px;
      padding: 10px 12px;
      min-height: 50px;
    }

    .knockout-team-line.winner {
      border-color: rgba(34, 197, 94, .65);
      color: #bbf7d0;
      font-weight: 700;
    }

    .knockout-resolved-team {
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      min-width: 0;
      line-height: 1.18;
    }

    .knockout-resolved-team > span:last-child {
      display: flex;
      flex-direction: column;
      min-width: 0;
      gap: 3px;
    }

    .knockout-resolved-team strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .knockout-original-label {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      line-height: 1.1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .knockout-score {
      color: #f8fafc;
      font-weight: 800;
      min-width: 22px;
      text-align: right;
      font-size: 16px;
    }

    .knockout-resolved-team .flag-img {
      width: 22px;
      height: 16px;
      object-fit: cover;
      border-radius: 3px;
    }

    .knockout-winner-note {
      margin-top: 10px;
      color: #bbf7d0;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      line-height: 1.25;
    }

    .knockout-winner-note-label {
      font-weight: 700;
      flex: 0 0 auto;
      white-space: nowrap;
    }

    .knockout-winner-note-team {
      display: inline-flex;
      align-items: center;
      min-width: 0;
      max-width: 100%;
    }

    .knockout-winner-note .knockout-resolved-team {
      display: inline-grid;
      grid-template-columns: 22px minmax(0, 1fr);
      gap: 6px;
      max-width: 100%;
    }

    .knockout-winner-note .knockout-resolved-team > span:last-child {
      gap: 1px;
    }

    .knockout-winner-note .knockout-resolved-team strong {
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
      line-height: 1.15;
    }

    .knockout-winner-note .knockout-original-label {
      display: none;
    }

    .knockout-missing-note {
      margin-top: 10px;
      color: #fde68a;
      font-size: 13px;
    }

    @media (max-width: 760px) {
      .knockout-grid { grid-template-columns: 1fr; padding: 10px; }
      .knockout-card { padding: 12px; }
      .knockout-team-line { grid-template-columns: minmax(0, 1fr) 28px; padding: 9px 10px; }
    }


    .audit-summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin: 14px 0;
    }

    .audit-metric {
